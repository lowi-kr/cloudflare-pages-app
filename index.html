<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - Cloudflare Pages</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>My Todo App</h1>
            <p>Stay organized and productive</p>
        </header>

        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="Add a new todo..." 
                autocomplete="off"
            >
            <button id="addBtn" onclick="addTodo()">Add Todo</button>
        </div>

        <div class="stats">
            <span id="totalTodos">Total: 0</span>
            <span id="completedTodos">Completed: 0</span>
        </div>

        <ul id="todoList" class="todo-list"></ul>

        <button id="clearBtn" onclick="clearCompleted()" class="clear-btn">Clear Completed</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
